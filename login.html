<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account - MetroMall</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-light bg-white shadow-sm mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="#" onclick="history.back(); return false;" class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> <span>Back</span>
            </a>
            <a class="navbar-brand fw-bold text-success m-0" href="index.html">
                <i class="fa-solid fa-cart-shopping me-2"></i>MetroMall
            </a>
            <div style="width: 75px;" class="d-none d-md-block"></div>
        </div>
    </nav>

    <div class="container my-5" style="max-width: 450px;">
        
        <div id="login-state" class="card shadow border-0 p-4 bg-white rounded-4">
            <h3 class="fw-bold text-center mb-4">Sign In</h3>
            <form id="profileLoginForm">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Your Name</label>
                    <input type="text" id="usernameInput" class="form-control" placeholder="Enter your name" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted">Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold py-2">
                    Login <i class="fa-solid fa-right-to-bracket ms-2"></i>
                </button>
            </form>
        </div>

        <div id="dashboard-state" class="card shadow border-0 p-4 text-center bg-white rounded-4 d-none">
            <div class="mb-3 d-flex justify-content-center">
                <div class="rounded-circle bg-success bg-opacity-10 d-flex align-items-center justify-content-center shadow-sm" style="width: 100px; height: 100px;">
                    <i class="fa-solid fa-circle-user fs-1 text-success"></i>
                </div>
            </div>
            <h3 class="fw-bold mb-1" id="display-name">User</h3>
            <p class="text-muted small mb-4">Premium Member</p>
            
            <hr class="opacity-25 my-3">
            
            <div class="d-flex flex-column gap-2 mt-4">
                <a href="index.html" class="btn btn-outline-success w-100 fw-bold">Continue Shopping</a>
                <button class="btn btn-danger w-100 fw-bold mt-2" onclick="logoutUser()">
                    Log Out <i class="fa-solid fa-right-from-bracket ms-2"></i>
                </button>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            checkLoginState();

            // Handle when the login form is submitted
            const loginForm = document.getElementById('profileLoginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const name = document.getElementById('usernameInput').value;
                    
                    // Save to browser memory
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('username', name);
                    
                    // Refresh view interface immediately
                    checkLoginState();
                });
            }
        });

        function checkLoginState() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const username = localStorage.getItem('username');
            
            const loginBox = document.getElementById('login-state');
            const dashboardBox = document.getElementById('dashboard-state');
            const displayName = document.getElementById('display-name');

            if (isLoggedIn === 'true' && username) {
                // User is logged in: Show Dashboard, Hide Login Form
                if(loginBox) loginBox.classList.add('d-none');
                if(dashboardBox) dashboardBox.classList.remove('d-none');
                if(displayName) displayName.innerText = username;
            } else {
                // User is logged out: Show Login Form, Hide Dashboard
                if(loginBox) loginBox.classList.remove('d-none');
                if(dashboardBox) dashboardBox.classList.add('d-none');
            }
        }

        function logoutUser() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('username');
            window.location.reload(); // Refresh to go back to clean login form
        }
    </script>
</body>
</html>
